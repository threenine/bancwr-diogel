version: '3.8'

services:
    bunker:
      image: ghcr.io/threenine/bancwr-diogel-backend:latest
      container_name: bancwr-bunker
      restart: unless-stopped
      ports:
        - "3000:3000"
      environment:
        - BUNKER_NSEC=${BUNKER_NSEC}
        - BUNKER_PORT=3000
        - RUST_LOG=info
        - DATABASE_PATH=/data/bancwr.db
      volumes:
        - ./data:/data

    frontend:
      image: ghcr.io/threenine/bancwr-diogel-frontend:latest
      container_name: bancwr-frontend
      restart: unless-stopped
      ports:
        - "3001:3000"
      environment:
        - NUXT_API_PROXY_TARGET=http://bunker:3000
      depends_on:
        - bunker